on:
  workflow_dispatch:

jobs:
  main:
    name: Publish Homey App
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Needed for the Validate step below: this app uses TypeScript, and
      # github-action-homey-app-validate runs `npx tsc` against whatever
      # node_modules is already on disk — it does not install anything itself.
      # (github-action-homey-app-publish, in contrast, does run its own
      # npm ci before publishing, so no setup is needed for that step.)
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies
        run: npm install

      - name: Validate Homey App
        uses: athombv/github-action-homey-app-validate@master
        with:
          level: verified

      - name: Publish Homey App
        uses: athombv/github-action-homey-app-publish@master
        id: publish
        with:
          personal_access_token: ${{ secrets.HOMEY_PAT }}

      - name: Output Management URL
        run: |
          echo "Manage your app at ${{ steps.publish.outputs.url }}." >> $GITHUB_STEP_SUMMARY

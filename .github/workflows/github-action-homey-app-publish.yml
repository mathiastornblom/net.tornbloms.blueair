on:
  workflow_dispatch:

jobs:
  main:
    name: Publish Homey App
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Note: no Node setup needed here — both actions below run their own
      # npm ci / build inside their own container (see Dockerfile/entrypoint.sh
      # at athombv/github-action-homey-app-{validate,publish}).
      - name: Validate Homey App
        uses: athombv/github-action-homey-app-validate@master
        with:
          level: verified

      - name: Publish Homey App
        uses: athombv/github-action-homey-app-publish@master
        id: publish
        with:
          personal_access_token: ${{ secrets.HOMEY_PAT }} 

      - name: Output Management URL
        run: |
          echo "Manage your app at ${{ steps.publish.outputs.url }}." >> $GITHUB_STEP_SUMMARY

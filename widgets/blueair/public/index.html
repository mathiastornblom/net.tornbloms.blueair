<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=0" />
    <title>BlueAir Air Quality</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div id="app">
      <div id="header">
        <select id="device-select" aria-label="Select device"></select>
      </div>

      <div id="state-loading" class="state-view">Loading…</div>
      <div id="state-no-devices" class="state-view" hidden>No BlueAir devices found</div>
      <div id="state-error" class="state-view" hidden>Could not load data</div>

      <div id="main" hidden>
        <!-- Primary metric: PM2.5 -->
        <div id="pm25-card">
          <div id="pm25-value">—</div>
          <div id="pm25-unit">μg/m³  ·  PM2.5</div>
          <span id="pm25-badge" hidden></span>
        </div>

        <!-- Secondary metrics grid (PM1, PM10, tVOC, Humidity, Temp, Fan) -->
        <div id="metrics-grid"></div>

        <!-- Filter + connectivity status -->
        <div id="status-bar">
          <span id="filter-label"></span>
          <span id="wifi-label"></span>
        </div>
      </div>
    </div>

    <script src="index.js"></script>
  </body>
</html>
